#
# Sync skills from product repos into the nvidia/skills catalog.
# Reads component definitions from components.d/*.yml (one file per
# component) — teams onboard by adding their own file there, not by
# editing this workflow or any shared file.
#
# Requires a PAT (SKILLS_SYNC_PAT) with read access to all product
# repos, stored as a repository secret.

name: Sync Skills from Product Repos

on:
  schedule:
    # Twice daily: 06:00 UTC and 18:00 UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-skills
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills catalog
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify yq is available
        run: yq --version

      - name: Sync skills from product repos
        env:
          GH_TOKEN: ${{ secrets.SKILLS_SYNC_PAT }}
        run: |
          set -euo pipefail
          truncate -s 0 /tmp/rsynced-components.txt
          truncate -s 0 /tmp/changed-components.txt
          truncate -s 0 /tmp/failed-components.txt
          truncate -s 0 /tmp/sync-versions.txt

          # Aggregate per-component files into a single config so the
          # iteration loop below can index by position. The components.d/
          # layout means concurrent onboarding PRs never touch a shared
          # file — see components.d/README.md for the schema.
          CONFIG=/tmp/components.aggregated.yml
          yq ea '[.] | {"components": .}' components.d/*.yml > "$CONFIG"

          # Configure git to use the token via credential helper
          # so it never appears in clone URLs or error output
          git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${GH_TOKEN}"; }; f'

          component_count=$(yq '.components | length' "$CONFIG")

          for i in $(seq 0 $((component_count - 1))); do
            name=$(yq -r ".components[$i].name" "$CONFIG")
            repo=$(yq -r ".components[$i].repo" "$CONFIG")
            ref=$(yq -r ".components[$i].ref // \"main\"" "$CONFIG")

            echo "── $name ──"

            # Clone with sparse checkout
            tmp_dir=".tmp/$(echo "$repo" | tr '/' '-')"
            if ! git clone --depth 1 --filter=blob:none --sparse \
                   "https://github.com/${repo}.git" \
                   "$tmp_dir" -b "$ref" 2>/dev/null; then
              echo "  ⚠ Clone failed for $repo — skipping"
              echo "- **$name** ($repo): clone failed" >> /tmp/failed-components.txt
              continue
            fi

            # Capture upstream HEAD info for the README Version column
            upstream_sha=$(git -C "$tmp_dir" rev-parse HEAD)
            upstream_short_sha=$(git -C "$tmp_dir" rev-parse --short HEAD)
            upstream_date=$(git -C "$tmp_dir" show -s --format=%cs HEAD)
            slug=$(echo "$name" | tr 'A-Z ' 'a-z-')
            echo "$slug|$upstream_short_sha|$upstream_sha|$upstream_date|$repo" >> /tmp/sync-versions.txt

            # Collect all skill paths for sparse checkout
            skill_count=$(yq -r ".components[$i].skills | length" "$CONFIG")
            sparse_paths=""
            for j in $(seq 0 $((skill_count - 1))); do
              path=$(yq -r ".components[$i].skills[$j].path" "$CONFIG")
              sparse_paths="$sparse_paths $path"
            done
            (cd "$tmp_dir" && git sparse-checkout set $sparse_paths 2>/dev/null) || true

            # Copy each skill path to its catalog directory
            synced=false
            for j in $(seq 0 $((skill_count - 1))); do
              path=$(yq -r ".components[$i].skills[$j].path" "$CONFIG")
              catalog_dir=$(yq -r ".components[$i].skills[$j].catalog_dir" "$CONFIG")
              src="$tmp_dir/$path"

              if [ -d "$src" ] && [ -n "$(ls -A "$src" 2>/dev/null)" ]; then
                mkdir -p "skills/$catalog_dir"
                rsync -a --delete "$src/" "skills/$catalog_dir/"
                synced=true
                echo "  ✓ $path → skills/$catalog_dir/"
              else
                echo "  ⚠ $path empty or missing — skipping to preserve existing catalog"
                echo "- **$name** ($repo): \`$path\` empty or missing" >> /tmp/failed-components.txt
              fi
            done

            # Record successful rsync (used by the "fail if nothing synced"
            # health check) separately from actual content changes (used
            # for the PR title and body) — a component can rsync cleanly
            # yet have no diff when upstream is unchanged.
            if $synced; then
              echo "- $name" >> /tmp/rsynced-components.txt
              for j in $(seq 0 $((skill_count - 1))); do
                catalog_dir=$(yq -r ".components[$i].skills[$j].catalog_dir" "$CONFIG")
                if [ -n "$(git status --porcelain "skills/$catalog_dir" 2>/dev/null)" ]; then
                  echo "- $name" >> /tmp/changed-components.txt
                  break
                fi
              done
            fi
            echo ""
          done

          rm -rf .tmp

      - name: Fail if nothing synced
        run: |
          if [ ! -s /tmp/rsynced-components.txt ]; then
            echo "::error::All component checkouts failed — no skills were synced"
            exit 1
          fi

      - name: Regenerate README tables
        run: .github/scripts/regenerate-readme.sh

      - name: Build sync summary
        id: summary
        run: |
          # Surface failure count regardless of whether anything changed —
          # a quiet sync can still have a misconfigured component to flag.
          if [ -s /tmp/failed-components.txt ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

          if [ ! -s /tmp/changed-components.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::All components synced; no upstream content changes detected"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          changed=$(cat /tmp/changed-components.txt | tr '\n' ',' | sed 's/- //g;s/,$//')
          echo "title=chore: sync skills ($changed)" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<EOFBODY'
            echo "## Automated skills sync"
            echo ""
            echo "**Components updated:**"
            cat /tmp/changed-components.txt
            if [ -s /tmp/failed-components.txt ]; then
              echo ""
              echo "**Components that failed to sync:**"
              cat /tmp/failed-components.txt
            fi
            echo ""
            echo "Triggered by: \`${{ github.event_name }}\`"
            echo 'EOFBODY'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.summary.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.summary.outputs.title }}
          branch: automated/sync-skills
          title: ${{ steps.summary.outputs.title }}
          body: ${{ steps.summary.outputs.body }}
          delete-branch: true

      - name: Open issue for failed components
        if: steps.summary.outputs.has_failures == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failed = fs.readFileSync('/tmp/failed-components.txt', 'utf8').trim();
            const title = `Skills sync: some components failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `The [sync-skills workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) completed but some components failed to sync.`,
              ``,
              `**Failed components:**`,
              failed,
              ``,
              `**Run:** ${context.runId}`,
              `**Trigger:** \`${context.eventName}\``,
              ``,
              `This usually means the skill path in \`components.d/<slug>.yml\` doesn't match the actual directory in the source repo (e.g. symlink, renamed, or removed).`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['sync-failure']
            });

      - name: Open issue on total failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Skills sync failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `The [sync-skills workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed.`,
              ``,
              `**Trigger:** \`${context.eventName}\``,
              `**Run:** ${context.runId}`,
              ``,
              `Please investigate and re-run if needed.`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['sync-failure']
            });
