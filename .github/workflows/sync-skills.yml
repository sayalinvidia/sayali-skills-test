#
# Sync skills from product repos into the nvidia/skills catalog.
# Reads product definitions from products.yml — teams onboard by
# adding an entry there, not by editing this workflow.
#
# Requires a PAT (SKILLS_SYNC_PAT) with read access to all product
# repos, stored as a repository secret.

name: Sync Skills from Product Repos

on:
  schedule:
    # Twice daily: 06:00 UTC and 18:00 UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-skills
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills catalog
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync skills from product repos
        env:
          GH_TOKEN: ${{ secrets.SKILLS_SYNC_PAT }}
        run: |
          set -euo pipefail
          truncate -s 0 /tmp/synced-products.txt

          product_count=$(yq '.products | length' products.yml)

          for i in $(seq 0 $((product_count - 1))); do
            name=$(yq -r ".products[$i].name" products.yml)
            repo=$(yq -r ".products[$i].repo" products.yml)
            ref=$(yq -r ".products[$i].ref // \"main\"" products.yml)

            echo "── $name ──"

            # Clone with sparse checkout
            tmp_dir=".tmp/$(echo "$repo" | tr '/' '-')"
            if ! git clone --depth 1 --filter=blob:none --sparse \
                   "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" \
                   "$tmp_dir" -b "$ref" 2>/dev/null; then
              echo "  ⚠ Clone failed for $repo — skipping"
              continue
            fi

            # Collect all skill paths for sparse checkout
            skill_count=$(yq -r ".products[$i].skills | length" products.yml)
            sparse_paths=""
            for j in $(seq 0 $((skill_count - 1))); do
              path=$(yq -r ".products[$i].skills[$j].path" products.yml)
              sparse_paths="$sparse_paths $path"
            done
            (cd "$tmp_dir" && git sparse-checkout set $sparse_paths 2>/dev/null) || true

            # Copy each skill path to its catalog directory
            synced=false
            for j in $(seq 0 $((skill_count - 1))); do
              path=$(yq -r ".products[$i].skills[$j].path" products.yml)
              catalog_dir=$(yq -r ".products[$i].skills[$j].catalog_dir" products.yml)
              src="$tmp_dir/$path"

              if [ -d "$src" ] && [ -n "$(ls -A "$src" 2>/dev/null)" ]; then
                mkdir -p "skills/$catalog_dir"
                rsync -a --delete "$src/" "skills/$catalog_dir/"
                synced=true
                echo "  ✓ $path → skills/$catalog_dir/"
              else
                echo "  ⚠ $path empty or missing — skipping to preserve existing catalog"
              fi
            done

            $synced && echo "- $name" >> /tmp/synced-products.txt
            echo ""
          done

          rm -rf .tmp

      - name: Fail if nothing synced
        run: |
          if [ ! -s /tmp/synced-products.txt ]; then
            echo "::error::All product checkouts failed — no skills were synced"
            exit 1
          fi

      - name: Build sync summary
        id: summary
        run: |
          products=$(cat /tmp/synced-products.txt | tr '\n' ',' | sed 's/- //g;s/,$//')
          echo "title=chore: sync skills ($products)" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<EOFBODY'
            echo "## Automated skills sync"
            echo ""
            echo "Products synced:"
            cat /tmp/synced-products.txt
            echo ""
            echo "Triggered by: \`${{ github.event_name }}\`"
            echo 'EOFBODY'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.summary.outputs.title }}
          branch: automated/sync-skills
          title: ${{ steps.summary.outputs.title }}
          body: ${{ steps.summary.outputs.body }}
          delete-branch: true

      - name: Open issue on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Skills sync failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `The [sync-skills workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed.`,
              ``,
              `**Trigger:** \`${context.eventName}\``,
              `**Run:** ${context.runId}`,
              ``,
              `Please investigate and re-run if needed.`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['sync-failure']
            });
