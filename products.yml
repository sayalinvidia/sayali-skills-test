#
# Product catalog — single source of truth for NVIDIA Agent Skills.
#
# To onboard a new product:
#   1. Add an entry to this file following the pattern below
#   2. Open a pull request — that's it!
#
# The sync and CI workflows read this file automatically.
#
# Required fields:
#   name          Display name shown in the README
#   repo          GitHub repository (owner/repo)
#   description   One-line description for the README
#   skills        List of skill locations in the source repo
#     path          Directory containing skills in the source repo
#     catalog_dir   Directory name under skills/ in this catalog
#
# Optional fields:
#   ref           Branch to sync from (default: main)
#   links         Override default link behavior (see examples below)
#     contributing  Path to CONTRIBUTING file (default: CONTRIBUTING.md)
#     discussions   Set to false if repo has no Discussions tab
#     security      Set to false if repo has no SECURITY.md

products:
  - name: CUDA-Q
    repo: NVIDIA/cuda-quantum
    description: >-
      CUDA Quantum — onboarding guide for installation, test programs,
      GPU simulation, QPU hardware, and quantum applications.
    skills:
      - path: .claude/skills/
        catalog_dir: CUDA-Q
    links:
      contributing: Contributing.md

  - name: cuOpt
    repo: NVIDIA/cuopt
    description: >-
      GPU-accelerated optimization — vehicle routing, linear programming,
      quadratic programming, installation, server deployment, and developer tools.
    skills:
      - path: skills/
        catalog_dir: cuopt

  - name: TensorRT-LLM
    repo: NVIDIA/TensorRT-LLM
    description: >-
      LLM inference optimization — model onboarding, performance analysis
      and optimization, kernel writing, CI diagnostics, code contribution,
      and codebase exploration.
    skills:
      - path: .claude/skills/
        catalog_dir: TensorRT-LLM

  - name: Model-Optimizer
    repo: NVIDIA/Model-Optimizer
    description: >-
      Model optimization — quantization, sparsity, and distillation
      for efficient inference.
    skills:
      - path: .claude/skills/
        catalog_dir: Model-Optimizer
    links:
      discussions: false

  - name: Megatron-Core
    repo: NVIDIA/Megatron-LM
    description: >-
      Large-scale distributed training — model parallelism, pipeline
      parallelism, and mixed precision.
    skills:
      - path: .claude/skills/
        catalog_dir: Megatron-Core
    links:
      security: false

  - name: Megatron-Bridge
    repo: NVIDIA-NeMo/Megatron-Bridge
    description: >-
      Bridge between NeMo and Megatron — data processing, model conversion,
      and training utilities.
    skills:
      - path: skills/
        catalog_dir: Megatron-Bridge
    links:
      security: false

  - name: Nemotron Voice Agent
    repo: NVIDIA-AI-Blueprints/nemotron-voice-agent
    description: >-
      Real-time conversational AI — deploy speech-to-speech voice agents
      on Workstation, Jetson Thor, or Cloud NIMs.
    skills:
      - path: .agents/skills/
        catalog_dir: nemotron-voice-agent

  - name: NeMo Gym
    repo: NVIDIA-NeMo/Gym
    description: >-
      RL training environments — add benchmarks, resources servers,
      agent wiring, and reward profiling.
    skills:
      - path: .claude/skills/
        catalog_dir: NeMo-Gym

  - name: NeMo Evaluator
    repo: NVIDIA-NeMo/Evaluator
    description: >-
      LLM evaluation — launch evaluations, access MLflow results,
      NeMo Evaluator Launcher assistant, and bring-your-own benchmarks.
    skills:
      - path: packages/nemo-evaluator-launcher/.claude/skills/
        catalog_dir: NeMo-Evaluator-Launcher
      - path: packages/nemo-evaluator/.claude/skills/
        catalog_dir: NeMo-Evaluator
